<style>
:root{--bg:#0F0D16;--card:#191625;--line:#2A2638;--txt:#EFECF6;--mut:#8E88A3;--acc:#F2B441;--grn:#6ED49B;--vio:#9D8CFF}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font:15px/1.4 -apple-system,'Segoe UI',Inter,sans-serif;padding-bottom:70px;padding-top:env(safe-area-inset-top)}
.mono{font-family:'SF Mono',ui-monospace,'IBM Plex Mono',monospace}
header{position:sticky;top:0;z-index:5;background:var(--bg);padding:14px 14px 6px;max-width:680px;margin:0 auto}
.brand{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.mark{color:var(--acc);font-size:18px}
h1{font-size:21px;font-weight:800;letter-spacing:-.02em}
.tally{margin-left:auto;font-size:11px;color:var(--mut)}
.gear{background:none;border:none;color:var(--mut);font-size:18px;padding:2px 4px}
.srow{display:flex;gap:8px}
.srow input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:16px;outline:none;min-width:0}
.srow input:focus{border-color:var(--acc)}
.addb{background:var(--acc);color:#1A1408;border:none;border-radius:10px;padding:0 14px;font-weight:700;font-size:14px}
nav{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button,.chips button{background:var(--card);border:1px solid var(--line);color:#B9B3CC;border-radius:999px;padding:7px 12px;font-size:13px;white-space:nowrap}
nav button.on,.chips button.on{background:var(--acc);border-color:var(--acc);color:#1A1408;font-weight:700}
nav em{font-style:normal;font-size:11px;color:inherit;opacity:.65;margin-left:2px}
main{padding:4px 14px;max-width:680px;margin:0 auto}
.chips{display:flex;gap:6px;padding:4px 0 10px;flex-wrap:wrap}
.empty{color:var(--mut);text-align:center;padding:40px 20px}
.results{color:var(--mut);font-size:13px;padding:4px 2px 8px}
/* rows */
.row{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;padding:10px;align-items:center;width:100%;text-align:left;color:var(--txt)}
button.row{cursor:pointer}
.poster{width:52px;height:76px;border-radius:8px;background:#231F31;flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;color:#4a4460;font-size:20px;overflow:hidden}
.poster img{width:100%;height:100%;object-fit:cover;display:block}
.rmid{flex:1;min-width:0}
.rt1{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rt2{color:var(--mut);font-size:12.5px;margin-top:2px}
.badges{display:flex;gap:8px;margin-top:6px;font-size:11.5px;flex-wrap:wrap}
.bdg{color:var(--acc);font-weight:600}
.bdg.g{color:var(--grn)}
.prog{height:3px;background:#231F31;border-radius:2px;margin-top:7px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--acc)}
.frac{font-size:13px;font-weight:600;flex-shrink:0}
.frac em{color:var(--mut);font-style:normal;font-weight:400}
.fav{color:var(--acc);font-style:normal;margin-right:4px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;position:absolute}
/* detail screen */
.screen{position:fixed;inset:0;background:var(--bg);z-index:20;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px}
.hero{position:relative;padding:calc(14px + env(safe-area-inset-top)) 16px 16px;background:linear-gradient(#1c1830,var(--bg));display:flex;gap:14px}
.back{position:sticky;top:calc(8px + env(safe-area-inset-top));background:rgba(15,13,22,.75);border:1px solid var(--line);color:var(--txt);border-radius:999px;padding:8px 14px;font-size:14px;margin:8px 0 0 14px;z-index:2;backdrop-filter:blur(6px)}
.hposter{width:96px;height:142px;border-radius:10px;flex-shrink:0}
.hinfo h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.hmeta{color:var(--mut);font-size:13px;margin-bottom:8px}
.rates{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;font-weight:600}
.rates span b{font-weight:700}
.sect{padding:8px 14px;max-width:680px;margin:0 auto}
.acts{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.acts button{background:#231F31;border:1px solid var(--line);color:#D9D4E8;border-radius:10px;padding:10px 13px;font-size:13.5px}
.acts button.big{background:var(--acc);border-color:var(--acc);color:#1A1408;font-weight:700}
.acts button.danger{color:#FF8A80;border-color:#4a2b2b;margin-left:auto}
/* seasons */
.season{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden}
.shead{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--txt);padding:13px 14px;font-size:15px;font-weight:600;text-align:left}
.shead .frac{margin-left:auto}
.chk{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:#231F31;color:transparent;font-size:15px;flex-shrink:0;line-height:1}
.chk.on{background:var(--grn);border-color:var(--grn);color:#0c2417}
.srate{font-size:12px;color:var(--acc);font-weight:600}
.eplist{border-top:1px solid #231F31}
.ep{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #201c2d;font-size:14px}
.ep:last-child{border-bottom:none}
.epn{color:var(--mut);font-size:12px;width:34px;flex-shrink:0}
.ept{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eprate{font-size:11.5px;color:var(--acc);font-weight:600;flex-shrink:0}
.ep .chk{width:26px;height:26px}
/* stats */
.bignum{text-align:center;padding:20px 0 24px}
.bignum .num{font-size:48px;font-weight:800;display:block;color:var(--acc);letter-spacing:-.03em}
.bignum .lbl{color:var(--mut);font-size:13px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.stat .num{font-size:21px;font-weight:700;display:block}
.stat .lbl{color:var(--mut);font-size:12px}
/* overlay / sheet */
.overlay{position:fixed;inset:0;background:rgba(8,7,12,.72);z-index:30;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
.sheet h2{font-size:17px;margin-bottom:12px}
.sheet input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--txt);font-size:16px;margin-bottom:10px;outline:none}
.sheet input:focus{border-color:var(--acc)}
.sheet p{color:var(--mut);font-size:13px;margin:2px 0 12px;line-height:1.5}
.sheet a{color:var(--acc)}
.toast{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--acc);color:#1A1408;font-weight:700;font-size:13px;padding:9px 16px;border-radius:999px;z-index:40}
.hide{display:none!important}
button{cursor:pointer;font-family:inherit}
</style>
</head>

      seasons:r[5].map(x=>({n:x[0],total:x[1],w:x[2],sp:!!x[3]})),l:r[6]})),
      movies:SEED.movies.map(r=>({id:nid(),t:r[0],y:r[1]||null,w:!!r[2],f:!!r[3],imdb:r[4],l:r[5]}))};
    save();
  }
  try{cache=JSON.parse(localStorage.getItem(CKEY))||{}}catch(e){cache={}}
  try{settings=JSON.parse(localStorage.getItem(SKEY))||{}}catch(e){settings={}}
  if(!settings.tmdb){settings.tmdb='9af69203edc46b5ed4cb6bf4cce4ac8e';settings.dismissedSetup=1;saveSettings()}
}
let saveT; function save(){clearTimeout(saveT);saveT=setTimeout(()=>{try{localStorage.setItem(DKEY,JSON.stringify(data))}catch(e){toast('Save failed — storage full?')}},400)}
let cacheT; function saveCache(){clearTimeout(cacheT);cacheT=setTimeout(()=>{try{localStorage.setItem(CKEY,JSON.stringify(cache))}catch(e){cache={};}},800)}
function saveSettings(){localStorage.setItem(SKEY,JSON.stringify(settings))}

// season helpers: w is -1 (all), 0 (none) or array of watched ep numbers
const seasonWatched=se=>se.w===-1?se.total:(se.w===0?0:se.w.length);
const showWatched=s=>s.seasons.filter(x=>!x.sp).reduce((a,se)=>a+seasonWatched(se),0);
const showTotal=s=>s.seasons.filter(x=>!x.sp).reduce((a,se)=>a+se.total,0);
const epWatched=(se,n)=>se.w===-1?true:(se.w===0?false:se.w.includes(n));
function setEp(se,n,on,epNums){
  let set=new Set(se.w===-1?epNums:(se.w===0?[]:se.w));
  on?set.add(n):set.delete(n);
  se.w=set.size===0?0:(set.size>=se.total?-1:[...set].sort((a,b)=>a-b));
}

// ---------- TMDB / OMDb ----------
const q=[]; let busy=false;
function enqueue(fn){q.push(fn);pump()}
async function pump(){if(busy||!q.length)return;busy=true;const fn=q.shift();try{await fn()}catch(e){}
  setTimeout(()=>{busy=false;pump()},120)}
async function tmdb(path){
  if(!settings.tmdb)throw 0;
  const r=await fetch('https://api.themoviedb.org/3'+path+(path.includes('?')?'&':'?')+'api_key='+encodeURIComponent(settings.tmdb));
  if(!r.ok)throw 0; return r.json();
}
function metaFor(item,isMovie){
  const key=(isMovie?'m':'s')+item.id;
  return cache[key];
}
function requestMeta(item,isMovie){
  const key=(isMovie?'m':'s')+item.id;
  if(cache[key]||cache[key+'_x']||!settings.tmdb)return;
  cache[key+'_x']=1;
  enqueue(async()=>{
    try{
      let hit=null;
      if(isMovie){
        if(item.imdb){const f=await tmdb('/find/'+item.imdb+'?external_source=imdb_id');hit=(f.movie_results||[])[0]}
        if(!hit){const s=await tmdb('/search/movie?query='+encodeURIComponent(item.t)+(item.y?'&year='+item.y:''));hit=(s.results||[])[0]}
      }else{
        if(item.tvdb){const f=await tmdb('/find/'+item.tvdb+'?external_source=tvdb_id');hit=(f.tv_results||[])[0]}
        if(!hit&&item.imdb){const f=await tmdb('/find/'+item.imdb+'?external_source=imdb_id');hit=(f.tv_results||[])[0]}
        if(!hit){const s=await tmdb('/search/tv?query='+encodeURIComponent(item.t));hit=(s.results||[])[0]}
      }
      cache[key]=hit?{id:hit.id,p:hit.poster_path||'',r:hit.vote_average?+hit.vote_average.toFixed(1):0}:{id:0,p:'',r:0};
      delete cache[key+'_x'];saveCache();patchRow(key,item,isMovie);
      if(view.detail&&view.detail.item.id===item.id)render();
    }catch(e){delete cache[key+'_x']}
  });
}
function requestOmdb(item){
  if(!settings.omdb||!item.imdb)return;
  const key='o'+item.imdb;
  if(cache[key]||cache[key+'_x'])return;
  cache[key+'_x']=1;
  enqueue(async()=>{
    try{
      const r=await fetch('https://www.omdbapi.com/?i='+item.imdb+'&apikey='+encodeURIComponent(settings.omdb));
      const j=await r.json();
      const rt=(j.Ratings||[]).find(x=>x.Source==='Rotten Tomatoes');
      cache[key]={imdb:j.imdbRating&&j.imdbRating!=='N/A'?j.imdbRating:'',rt:rt?rt.Value:''};
      delete cache[key+'_x'];saveCache();
      if(view.detail&&view.detail.item.id===item.id)render();
    }catch(e){delete cache[key+'_x']}
  });
}
function requestSeasonEps(item,seasonNum){
  const m=metaFor(item,false); if(!m||!m.id||!settings.tmdb)return null;
  const key='se'+m.id+'_'+seasonNum;
  if(cache[key])return cache[key];
  if(!cache[key+'_x']){cache[key+'_x']=1;
    enqueue(async()=>{try{
      const j=await tmdb('/tv/'+m.id+'/season/'+seasonNum);
      cache[key]={r:j.vote_average?+j.vote_average.toFixed(1):0,
        eps:(j.episodes||[]).map(e=>[e.episode_number,e.name||'',e.vote_average?+e.vote_average.toFixed(1):0])};
      delete cache[key+'_x'];saveCache();
      if(view.detail&&view.detail.item.id===item.id)render();
    }catch(e){delete cache[key+'_x']}});}
  return null;
}
function patchRow(key,item,isMovie){
  const el=document.querySelector('[data-p="'+key+'"]');
  const m=cache[key];
  if(el&&m&&m.p)el.innerHTML='<img loading="lazy" src="'+IMG+m.p+'" alt="">';
  const rb=document.querySelector('[data-r="'+key+'"]');
  if(rb&&m&&m.r)rb.textContent='★ '+m.r;
}

// ---------- rendering ----------
function toast(msg){let t=$('#toast');if(t)t.remove();t=document.createElement('div');t.id='toast';t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1900)}

function render(){
  const app=$('#app');
  if(view.detail){app.innerHTML=view.detail.movie?movieDetail(view.detail.item):showDetail(view.detail.item);afterRender();return}
  const eps=data.series.reduce((a,s)=>a+showWatched(s),0);
  const mw=data.movies.filter(m=>m.w).length;
  const counts=STATUS.map((_,i)=>data.series.filter(s=>s.s===i).length);
  const searching=view.q.trim().length>0, ql=view.q.trim().toLowerCase();
  let sl=[],ml=[];
  if(searching){sl=data.series.filter(s=>s.t.toLowerCase().includes(ql));ml=data.movies.filter(m=>m.t.toLowerCase().includes(ql))}
  else if(view.tab<=3)sl=data.series.filter(s=>s.s===view.tab);
  else if(view.tab===4){ml=data.movies;if(view.mfilter==='watched')ml=ml.filter(m=>m.w);if(view.mfilter==='towatch')ml=ml.filter(m=>!m.w)}
  const srt=(a,b)=>(b.l||'').localeCompare(a.l||'')||a.t.localeCompare(b.t);
  sl=[...sl].sort(srt); ml=[...ml].sort(srt);

  let body='';
  if(searching)body+='<p class="results">'+(sl.length+ml.length)+' results</p>';
  if(!searching&&view.tab===4)body+='<div class="chips">'+[['all','All'],['watched','Watched'],['towatch','To watch']].map(([v,l])=>'<button data-mf="'+v+'" class="'+(view.mfilter===v?'on':'')+'">'+l+'</button>').join('')+'</div>';
  body+=sl.map(seriesRow).join('');
  if(searching&&ml.length&&sl.length)body+='<p class="results">Movies</p>';
  body+=ml.map(movieRow).join('');
  if(!searching&&view.tab===5)body+=statsView(eps,mw);
  if(!body.trim()||(view.tab!==5&&!sl.length&&!ml.length))body+='<p class="empty">'+(searching?'No matches. Use + Add to log it.':'Nothing here yet.')+'</p>';

  app.innerHTML='<header><div class="brand"><span class="mark">▸</span><h1>Watch Log</h1><span class="tally mono">'+fmt(eps)+' eps · '+fmt(mw)+' films</span><button class="gear" id="gear" aria-label="Settings">⚙︎</button></div>'
  +'<div class="srow"><input id="q" placeholder="Search everything…" value="'+esc(view.q)+'">'
  +'<button class="addb" id="addb">+ Add</button></div>'
  +(searching?'':'<nav>'+STATUS.map((st,i)=>'<button data-tab="'+i+'" class="'+(view.tab===i?'on':'')+'">'+st.l+' <em>'+counts[i]+'</em></button>').join('')
    +'<button data-tab="4" class="'+(view.tab===4?'on':'')+'">Movies <em>'+data.movies.length+'</em></button>'
    +'<button data-tab="5" class="'+(view.tab===5?'on':'')+'">Stats</button></nav>')
  +'</header><main>'+body+'</main>';
  afterRender();
  if(!settings.tmdb&&!settings.dismissedSetup){settings.dismissedSetup=1;saveSettings();openSettings(true)}
}

function posterCell(key,big){
  const m=cache[key];
  const src=m&&m.p?(big?IMGBIG:IMG)+m.p:'';
  return '<div class="poster'+(big?' hposter':'')+'" data-p="'+key+'">'+(src?'<img loading="lazy" src="'+src+'" alt="">':'▸')+'</div>';
}
function seriesRow(s){
  const key='s'+s.id, m=cache[key]; requestMeta(s,false);
  const w=showWatched(s), n=showTotal(s), pct=n?Math.min(100,w/n*100):0, st=STATUS[s.s];
  return '<button class="row" data-open="s:'+s.id+'">'+posterCell(key)
  +'<div class="rmid"><div class="rt1">'+(s.f?'<i class="fav">★</i>':'')+esc(s.t)+'</div>'
  +'<div class="rt2">'+st.l+(s.l?' · '+s.l:'')+'</div>'
  +'<div class="badges"><span class="bdg" data-r="'+key+'">'+(m&&m.r?'★ '+m.r:'')+'</span></div>'
  +'<div class="prog"><i style="width:'+pct+'%;background:'+st.c+'"></i></div></div>'
  +'<span class="frac mono">'+w+'<em>/'+(n||'?')+'</em></span></button>';
}
function movieRow(mv){
  const key='m'+mv.id, m=cache[key]; requestMeta(mv,true);
  return '<button class="row" data-open="m:'+mv.id+'">'+posterCell(key)
  +'<div class="rmid"><div class="rt1">'+(mv.f?'<i class="fav">★</i>':'')+esc(mv.t)+(mv.y?' <span style="color:var(--mut);font-weight:400">'+mv.y+'</span>':'')+'</div>'
  +'<div class="rt2">'+(mv.w?'Watched'+(mv.l?' '+mv.l:''):'Not watched')+'</div>'
  +'<div class="badges"><span class="bdg" data-r="'+key+'">'+(m&&m.r?'★ '+m.r:'')+'</span></div></div>'
  +'<span class="frac mono" style="color:'+(mv.w?'var(--grn)':'var(--mut)')+'">'+(mv.w?'✓':'—')+'</span></button>';
}
function statsView(eps,mw){
  const done=data.series.filter(s=>{const n=showTotal(s);return n>0&&showWatched(s)>=n}).length;
  const favs=data.series.filter(s=>s.f).length+data.movies.filter(m=>m.f).length;
  return '<div class="bignum"><span class="num mono">'+fmt(eps)+'</span><span class="lbl">episodes watched · ≈'+fmt(Math.round(eps*42/60))+' hours</span></div>'
  +'<div class="grid"><div class="stat"><span class="num mono">'+fmt(data.series.length)+'</span><span class="lbl">shows tracked</span></div>'
  +'<div class="stat"><span class="num mono">'+fmt(done)+'</span><span class="lbl">shows finished</span></div>'
  +'<div class="stat"><span class="num mono">'+mw+'/'+data.movies.length+'</span><span class="lbl">movies watched</span></div>'
  +'<div class="stat"><span class="num mono">'+fmt(favs)+'</span><span class="lbl">favorites</span></div></div>';
}

function showDetail(s){
  const key='s'+s.id, m=cache[key]; requestMeta(s,false); requestOmdb(s);
  const o=s.imdb?cache['o'+s.imdb]:null;
  const w=showWatched(s), n=showTotal(s), st=STATUS[s.s];
  let seasons=s.seasons.filter(x=>!x.sp).map(se=>{
    const sw=seasonWatched(se), open=view.openSeason===se.n;
    const sc=m&&m.id?cache['se'+m.id+'_'+se.n]:null;
    if(open)requestSeasonEps(s,se.n);
    let eps='';
    if(open){
      if(sc){eps='<div class="eplist">'+sc.eps.map(e=>{
        const on=epWatched(se,e[0]);
        return '<div class="ep"><span class="epn mono">E'+String(e[0]).padStart(2,'0')+'</span><span class="ept">'+esc(e[1])+'</span>'
        +(e[2]?'<span class="eprate">★ '+e[2]+'</span>':'')
        +'<button class="chk'+(on?' on':'')+'" data-ep="'+s.id+':'+se.n+':'+e[0]+'">✓</button></div>'}).join('')+'</div>';
      }else{
        const nums=Array.from({length:se.total},(_,i)=>i+1);
        eps='<div class="eplist">'+(settings.tmdb?'<div class="ep" style="color:var(--mut)">Loading episodes…</div>':'')
        +nums.map(nn=>{const on=epWatched(se,nn);
          return '<div class="ep"><span class="epn mono">E'+String(nn).padStart(2,'0')+'</span><span class="ept" style="color:var(--mut)">Episode '+nn+'</span>'
          +'<button class="chk'+(on?' on':'')+'" data-ep="'+s.id+':'+se.n+':'+nn+'">✓</button></div>'}).join('')+'</div>';
      }
    }
    return '<div class="season"><button class="shead" data-season="'+se.n+'">Season '+se.n
    +(sc&&sc.r?' <span class="srate">★ '+sc.r+'</span>':'')
    +'<span class="frac mono">'+sw+'<em>/'+se.total+'</em></span>'
    +'<span class="chk'+(sw>=se.total?' on':'')+'" data-sall="'+s.id+':'+se.n+'">✓</span></button>'
    +'<div class="prog" style="margin:0"><i style="width:'+(se.total?sw/se.total*100:0)+'%"></i></div>'+eps+'</div>';
  }).join('');
  return '<div class="screen"><button class="back" data-back="1">‹ Back</button>'
  +'<div class="hero">'+posterCell(key,true)+'<div class="hinfo"><h2>'+esc(s.t)+'</h2>'
  +'<div class="hmeta">'+s.seasons.filter(x=>!x.sp).length+' seasons · '+st.l+(s.l?' · last '+s.l:'')+'</div>'
  +'<div class="rates">'+(m&&m.r?'<span style="color:var(--acc)">TMDB <b>'+m.r+'</b></span>':'')
  +(o&&o.imdb?'<span style="color:#F5C518">IMDb <b>'+o.imdb+'</b></span>':'')
  +(o&&o.rt?'<span style="color:#FA320A">🍅 <b>'+o.rt+'</b></span>':'')+'</div>'
  +'<div class="rates" style="margin-top:8px"><span class="mono">'+w+' / '+n+' episodes</span></div></div></div>'
  +'<div class="sect"><div class="acts">'
  +STATUS.map((x,i)=>i===s.s?'':'<button data-st="'+i+'">→ '+x.l+'</button>').join('')
  +'<button data-fav="1">'+(s.f?'★ Unfavorite':'☆ Favorite')+'</button>'
  +'<button class="danger" data-del="1">Delete</button></div>'+seasons+'</div></div>';
}
function movieDetail(mv){
  const key='m'+mv.id, m=cache[key]; requestMeta(mv,true); requestOmdb(mv);
  const o=mv.imdb?cache['o'+mv.imdb]:null;
  return '<div class="screen"><button class="back" data-back="1">‹ Back</button>'

  +'<div class="hmeta">'+(mv.y||'')+' · '+(mv.w?'Watched'+(mv.l?' '+mv.l:''):'Not watched')+'</div>'
  +'<div class="rates">'+(m&&m.r?'<span style="color:var(--acc)">TMDB <b>'+m.r+'</b></span>':'')
  +(o&&o.imdb?'<span style="color:#F5C518">IMDb <b>'+o.imdb+'</b></span>':'')
  +(o&&o.rt?'<span style="color:#FA320A">🍅 <b>'+o.rt+'</b></span>':'')+'</div></div></div>'

}

// ---------- sheets ----------
function openSettings(first){
  const d=document.createElement('div');d.className='overlay';d.id='ovl';
  d.innerHTML='<div class="sheet"><h2>'+(first?'One-time setup':'Settings')+'</h2>'
  +'<p>Posters and ratings come from <b>TMDB</b> (free). Create a key at <a href="https://www.themoviedb.org/settings/api" target="_blank">themoviedb.org/settings/api</a> and paste it below. Optional: an <a href="https://www.omdbapi.com/apikey.aspx" target="_blank">OMDb key</a> adds IMDb + Rotten Tomatoes scores.</p>'
  +'<input id="k1" placeholder="TMDB API key" value="'+esc(settings.tmdb||'')+'">'
  +'<input id="k2" placeholder="OMDb API key (optional)" value="'+esc(settings.omdb||'')+'">'
  +'<div class="acts"><button class="big" id="ksave">Save</button><button id="kexp">Export backup</button><button id="kimp">Import backup</button><button id="kclose">Close</button></div>'
  +'<input type="file" id="kfile" accept=".json" class="hide"></div>';
  document.body.appendChild(d);
  d.addEventListener('click',e=>{if(e.target===d)d.remove()});
  $('#kclose').onclick=()=>d.remove();
  $('#ksave').onclick=()=>{settings.tmdb=$('#k1').value.trim();settings.omdb=$('#k2').value.trim();saveSettings();d.remove();toast('Saved');render()};
  $('#kexp').onclick=()=>{const b=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='watchlog-backup-'+today()+'.json';a.click()};
  $('#kimp').onclick=()=>$('#kfile').click();
  $('#kfile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const j=JSON.parse(r.result);if(j.series&&j.movies){data=j;save();d.remove();toast('Imported');render()}else toast('Not a Watch Log backup')}catch(err){toast('Import failed')}};r.readAsText(f)};
}
function openAdd(){
  let kind='series',status=3;
  const d=document.createElement('div');d.className='overlay';d.id='ovl';
  const draw=()=>{d.innerHTML='<div class="sheet"><h2>Add to library</h2>'
    +'<div class="chips"><button id="ks" class="'+(kind==='series'?'on':'')+'">Show</button><button id="km" class="'+(kind==='movie'?'on':'')+'">Movie</button></div>'
    +'<input id="at" placeholder="Title">'
    +(kind==='series'?'<input id="an" placeholder="Total episodes (optional)" inputmode="numeric"><div class="chips">'+STATUS.map((x,i)=>'<button data-as="'+i+'" class="'+(status===i?'on':'')+'">'+x.l+'</button>').join('')+'</div>'
      :'<input id="ay" placeholder="Year (optional)" inputmode="numeric">')
    +'<div class="acts"><button class="big" id="ago">Add</button><button id="acl">Cancel</button></div></div>';
    $('#ks').onclick=()=>{kind='series';draw()};$('#km').onclick=()=>{kind='movie';draw()};
    d.querySelectorAll('[data-as]').forEach(b=>b.onclick=()=>{status=+b.dataset.as;draw()});
    $('#acl').onclick=()=>d.remove();
    $('#ago').onclick=()=>{const t=$('#at').value.trim();if(!t)return;
      if(kind==='series'){const n=parseInt($('#an').value)||0;
        data.series.unshift({id:nid(),t,s:status,f:false,tvdb:0,imdb:'',seasons:n?[{n:1,total:n,w:0,sp:false}]:[],l:''});view.tab=status}
      else{data.movies.unshift({id:nid(),t,y:parseInt($('#ay').value)||null,w:false,f:false,imdb:'',l:''});view.tab=4}
      save();d.remove();view.q='';toast('Added');render()};
  };
  draw();document.body.appendChild(d);
  d.addEventListener('click',e=>{if(e.target===d)d.remove()});
}

// ---------- events ----------
function afterRender(){
  const app=$('#app');
  const qi=$('#q'); if(qi){qi.oninput=()=>{view.q=qi.value;renderKeepFocus()}}
  if($('#gear'))$('#gear').onclick=()=>openSettings(false);
  if($('#addb'))$('#addb').onclick=openAdd;
  app.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{view.tab=+b.dataset.tab;render()});
  app.querySelectorAll('[data-mf]').forEach(b=>b.onclick=()=>{view.mfilter=b.dataset.mf;render()});
  app.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{const[k,id]=b.dataset.open.split(':');
    const item=(k==='s'?data.series:data.movies).find(x=>x.id===id);
    view.detail={item,movie:k==='m'};view.openSeason=null;window.scrollTo(0,0);render()});
  app.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>{view.detail=null;render()});
  if(view.detail){
    const it=view.detail.item, kind=view.detail.movie?'movies':'series';
    app.querySelectorAll('[data-st]').forEach(b=>b.onclick=()=>{it.s=+b.dataset.st;save();render()});
    app.querySelectorAll('[data-fav]').forEach(b=>b.onclick=()=>{it.f=!it.f;save();render()});
    app.querySelectorAll('[data-mw]').forEach(b=>b.onclick=()=>{it.w=!it.w;if(it.w)it.l=today();save();render()});
    app.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{if(!confirm('Delete "'+it.t+'" from your library?'))return;
      data[kind]=data[kind].filter(x=>x.id!==it.id);save();view.detail=null;render();toast('Removed')});
    app.querySelectorAll('[data-season]').forEach(b=>b.onclick=()=>{const n=+b.dataset.season;view.openSeason=view.openSeason===n?null:n;render()});
    app.querySelectorAll('[data-sall]').forEach(b=>{b.onclick=e=>{e.stopPropagation();
      const[,sn]=b.dataset.sall.split(':');const se=it.seasons.find(x=>x.n===+sn&&!x.sp);
      se.w=seasonWatched(se)>=se.total?0:-1;if(se.w===-1)it.l=today();save();render()}});
    app.querySelectorAll('[data-ep]').forEach(b=>b.onclick=()=>{
      const[,sn,en]=b.dataset.ep.split(':');const se=it.seasons.find(x=>x.n===+sn&&!x.sp);
      const m=cache['s'+it.id];const sc=m&&m.id?cache['se'+m.id+'_'+sn]:null;
      const nums=sc?sc.eps.map(e=>e[0]):Array.from({length:se.total},(_,i)=>i+1);
      const on=!epWatched(se,+en);setEp(se,+en,on,nums);if(on)it.l=today();save();render()});
  }
}
function renderKeepFocus(){const pos=$('#q').selectionStart;render();const qi=$('#q');qi.focus();qi.setSelectionRange(pos,pos)}

load();render();
</script>
